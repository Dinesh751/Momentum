# PostgreSQL — Railway auto-injects these when you link the Postgres service
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.show-sql=false

# Flyway
spring.flyway.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.flyway.user=${PGUSER}
spring.flyway.password=${PGPASSWORD}

# JWT — set this manually in Railway dashboard
app.jwt.secret=${JWT_SECRET}

# Swagger — disabled in production
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
