<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="bolt" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4338ca" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full screen gradient — matches icon.png background exactly -->
  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- Soft glow behind bolt -->
  <ellipse cx="540" cy="960" rx="280" ry="300" fill="url(#glow)"/>

  <!-- Lightning bolt centred -->
  <polygon
    points="590,740  398,1010  518,1010  452,1180  682,890  558,890"
    fill="url(#bolt)"
  />
</svg>
