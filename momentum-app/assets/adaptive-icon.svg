<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Transparent background — Android applies backgroundColor from app.json as the background layer -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4338ca" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bolt" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>

  <!-- Subtle glow (transparent bg lets android bg show through) -->
  <ellipse cx="512" cy="512" rx="300" ry="320" fill="url(#glow)"/>

  <!-- Lightning bolt only — no background shape -->
  <polygon
    points="578,170 398,548 510,548 446,854 638,430 524,430"
    fill="url(#bolt)"
  />
</svg>
